<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor GLP — Megal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');
    :root {
      --bg:         #FFFFFF;
      --bg2:        #F5F7F5;
      --bg3:        #EDF2ED;
      --card:       #FFFFFF;
      --border:     rgba(0,100,40,0.12);
      --border2:    rgba(0,100,40,0.28);
      --green:      #006428;
      --green-light:#2E9E50;
      --green-dim:  rgba(0,100,40,0.07);
      --green-glow: rgba(0,100,40,0.15);
      --red:        #D93025;
      --red-dim:    rgba(217,48,37,0.08);
      --text:       #0F1F0F;
      --text2:      #4A6A4A;
      --text3:      #8AAA8A;
      --font-display:'Syne', sans-serif;
      --font-mono:  'DM Mono', monospace;
      --radius:     10px;
      --radius-lg:  16px;
      --shadow:     0 1px 4px rgba(0,100,40,0.08);
      --shadow-md:  0 4px 16px rgba(0,100,40,0.10);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body { background: var(--bg2); color: var(--text); font-family: var(--font-mono); min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .app-shell { display: grid; grid-template-columns: 270px 1fr; grid-template-rows: auto 1fr; min-height: 100vh; }

    /* HEADER */
    .header {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 20px;
      padding: 12px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--green);
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,60,20,0.18);
    }
    .header-logo { display: flex; align-items: center; }
    .header-logo img { height: 36px; filter: brightness(0) invert(1); }
    .header-divider { width: 1px; height: 28px; background: rgba(255,255,255,0.2); margin: 0 8px; }
    .header-subtitle { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 400; }

    .header-controls { display: flex; align-items: center; gap: 10px; margin-left: auto; }

    .select-wrapper { position: relative; }
    .select-wrapper::after { content: '▾'; position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--green); pointer-events: none; font-size: 11px; }

    select {
      appearance: none;
      background: #fff; border: 1px solid rgba(255,255,255,0.3);
      color: var(--text); font-family: var(--font-mono); font-size: 12px;
      padding: 7px 28px 7px 12px; border-radius: var(--radius);
      cursor: pointer; outline: none; min-width: 180px;
      box-shadow: var(--shadow);
    }
    select:hover, select:focus { border-color: var(--green-light); }
    #agente-select { min-width: 230px; font-weight: 500; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); flex-shrink: 0; }
    .status-dot.active { background: #7FE87F; box-shadow: 0 0 6px rgba(127,232,127,0.6); }
    .status-dot.loading { background: #FFD700; animation: pulse 1s infinite; }
    .status-dot.error { background: #FF6B6B; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* SIDEBAR */
    .sidebar { border-right: 1px solid var(--border); background: var(--bg); padding: 24px 0; overflow-y: auto; }
    .sidebar-section { padding: 0 16px 24px; }
    .sidebar-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); padding: 0 8px; margin-bottom: 8px; font-weight: 600; }
    .agent-card { background: var(--green-dim); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .agent-name { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--green); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .agent-meta { font-size: 11px; color: var(--text2); line-height: 1.9; }
    .agent-meta span { display: block; }
    .agent-badge { display: inline-block; background: var(--green); color: #fff; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 10px; border-radius: 20px; margin-top: 10px; font-weight: 600; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 0 16px 20px; }
    .eco-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
    .eco-row:last-child { border-bottom: none; }
    .eco-key { color: var(--text2); }
    .eco-val { color: var(--text); font-weight: 500; }

    /* MAIN */
    .main { padding: 24px 28px; overflow-y: auto; display: flex; flex-direction: column; gap: 22px; }

    .section-title { font-family: var(--font-display); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 10px; }
    .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; box-shadow: var(--shadow); transition: box-shadow 0.2s, transform 0.2s; position: relative; overflow: hidden; }
    .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--green); }
    .kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; font-weight: 600; }
    .kpi-value { font-family: var(--font-display); font-size: 24px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .kpi-sub { font-size: 11px; color: var(--text3); }
    .kpi-var { font-size: 11px; font-weight: 600; margin-top: 5px; }
    .kpi-var.up { color: var(--green-light); }
    .kpi-var.down { color: var(--red); }

    /* MERCADO */
    .mercado-banner { display: grid; grid-template-columns: repeat(4,1fr); gap: 1px; background: var(--border); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow); }
    .mercado-cell { background: var(--card); padding: 16px 20px; text-align: center; }
    .mercado-cell-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
    .mercado-cell-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: var(--text); }
    .mercado-cell.highlight { background: var(--green-dim); }
    .mercado-cell.highlight .mercado-cell-value { color: var(--green); }
    .mercado-cell-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

    /* TABLE */
    .table-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); padding: 10px 14px; text-align: right; border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap; background: var(--bg2); }
    thead th:first-child { text-align: left; }
    tbody td { padding: 11px 14px; font-size: 12px; color: var(--text2); text-align: right; border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody td:first-child { text-align: left; color: var(--text); font-weight: 600; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--green-dim); }
    .var-up { color: var(--green-light) !important; font-weight: 600; }
    .var-down { color: var(--red) !important; font-weight: 600; }
    .var-neutral { color: var(--text3) !important; }

    /* ECO */
    .eco-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .eco-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
    .eco-card-title { font-family: var(--font-display); font-weight: 700; font-size: 11px; color: var(--green); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }

    /* PRECIO FINAL */
    .precio-final-card { background: var(--green); border-radius: var(--radius-lg); padding: 22px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; box-shadow: var(--shadow-md); }
    .precio-final-label { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.8); letter-spacing: 0.04em; }
    .precio-final-periodo { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .precio-final-value { font-family: var(--font-display); font-size: 40px; font-weight: 800; color: #fff; line-height: 1; }
    .ganancia-badge { text-align: right; }
    .ganancia-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.08em; }
    .ganancia-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; color: #fff; margin-top: 2px; }

    /* CHART */
    .chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow); }
    .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .chart-title { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--text); }
    .chart-legend { display: flex; gap: 14px; font-size: 11px; color: var(--text2); }
    .chart-legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .chart-container { position: relative; height: 250px; }

    /* STATES */
    .state-overlay { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); font-size: 12px; text-align: center; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-icon { font-size: 28px; opacity: 0.3; }

    @media (max-width: 900px) {
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .eco-grid { grid-template-columns: 1fr; }
      .mercado-banner { grid-template-columns: repeat(2,1fr); }
    }

    /* LOGIN */
    .login-box {
      background: #fff; border-radius: 20px; padding: 48px 40px;
      width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; gap: 20px;
    }
    .login-logo { text-align: center; margin-bottom: 8px; }
    .login-logo img { height: 48px; }
    .login-title { font-family: var(--font-display); font-size: 20px; font-weight: 800; color: var(--green); text-align: center; }
    .login-subtitle { font-size: 12px; color: var(--text3); text-align: center; margin-top: -12px; }
    .login-field { display: flex; flex-direction: column; gap: 6px; }
    .login-field label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
    .login-field input {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px;
      font-family: var(--font-mono); font-size: 13px; color: var(--text);
      outline: none; transition: border-color 0.2s;
    }
    .login-field input:focus { border-color: var(--green); }
    .login-btn {
      background: var(--green); color: #fff; border: none;
      border-radius: var(--radius); padding: 12px;
      font-family: var(--font-display); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background 0.2s; letter-spacing: 0.04em;
    }
    .login-btn:hover { background: var(--green-light); }
    .login-error { color: var(--red); font-size: 12px; text-align: center; display: none; }
    .login-error.show { display: block; }
  </style>
</head>

  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxMX5RbYydLiGwx-ws2ZTPz5LViEPfcpglN1fg9lQ_S7b8OU83p-QOl8IglVqpK9KwkPA/exec',
  CHART_COLORS: { primary: '#006428', accent: '#2E9E50', textMuted: '#8AAA8A', text: '#0F1F0F', gridLine: 'rgba(0,100,40,0.06)' }
};

let chartHistorico = null;

document.addEventListener('DOMContentLoaded', async () => {
  setStatus('loading');
  buildPeriodos();
  await loadAgentes();
  setStatus('active');
  document.getElementById('agente-select').addEventListener('change', onSelectionChange);
  document.getElementById('periodo-select').addEventListener('change', onSelectionChange);
});

function setStatus(s) { document.getElementById('status-dot').className = 'status-dot ' + s; }

function apiFetch(params) {
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_cb_' + Math.round(Math.random() * 1000000);
    const url = new URL(CONFIG.APPS_SCRIPT_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
    url.searchParams.set('callback', callbackName);
    
    const script = document.createElement('script');
    script.src = url.toString();
    
    window[callbackName] = function(data) {
      delete window[callbackName];
      document.body.removeChild(script);
      resolve(data);
    };
    
    script.onerror = function() {
      delete window[callbackName];
      document.body.removeChild(script);
      reject(new Error('Error de conexión con la API'));
    };
    
    document.body.appendChild(script);
  });
}

// --- COMIENZO DEL BLOQUE A REEMPLAZAR ---

async function loadAgentes() {
  try {
    const data = await apiFetch({ action: 'agentes' });
    const agentes = data.agentes || [];
    const sel = document.getElementById('agente-select');
    
    // Seteamos las opciones iniciales
    sel.innerHTML = '<option value="">Seleccionar agente...</option><option value="__TODOS__">— Todos los agentes —</option>';
    
    // Cargamos la lista de agentes ordenada
    [...agentes].sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(ag => {
      const o = document.createElement('option');
      o.value = ag.nombre; 
      o.textContent = ag.nombre;
      sel.appendChild(o);
    });
  } catch(e) { 
    setStatus('error'); 
    console.error("Error al cargar agentes:", e); 
  }
}

async function onSelectionChange() {
  const agente = document.getElementById('agente-select').value;
  const periodo = document.getElementById('periodo-select').value;

  // Si falta alguno de los dos campos, no disparamos la búsqueda
  if (!agente || !periodo) return;

  setStatus('loading');
  
  // Limpiamos el contenido principal y ponemos el spinner de carga
  document.getElementById('main-content').innerHTML = `
    <div class="state-overlay">
      <div class="spinner"></div>
      <div>Cargando información...</div>
    </div>`;

  try {
    let data;
    // Petición diferenciada según la selección
    if (agente === '__TODOS__') {
      data = await apiFetch({ action: 'todos', periodo });
    } else {
      data = await apiFetch({ action: 'dashboard', agente, periodo });
    }

    // Si la API no responde o devuelve un error, lanzamos una excepción
    if (!data) throw new Error("La base de datos no devolvió información.");
    if (data.error) throw new Error(data.error);

    // Renderizado según el tipo de vista
    if (agente === '__TODOS__') {
      // Verificación de seguridad: si las funciones no existen, avisamos en consola
      if (typeof renderSidebarTodos === 'function' && typeof renderMainTodos === 'function') {
        renderSidebarTodos(data);
        renderMainTodos(data);
      } else {
        throw new Error("Las funciones de visualización global no están cargadas.");
      }
    } else {
      renderSidebar(data);
      renderMain(data);
    }

    setStatus('active');

  } catch(e) {
    console.error("Error detallado:", e);
    setStatus('error');
    // Mostramos el error visualmente para saber qué falló (como el 'reading mes')
    document.getElementById('main-content').innerHTML = `
      <div class="state-overlay">
        <div class="empty-icon">⚠</div>
        <div style="color:var(--red); font-weight:bold;">Error en la carga</div>
        <div style="font-size:11px; margin-top:8px; opacity:0.8;">${e.message}</div>
      </div>`;
  }
}

// --- FIN DEL BLOQUE A REEMPLAZAR ---

function renderSidebar(data) {
  const ag = data.agente, ec = data.economico;
  document.getElementById('agent-info-card').innerHTML = `
    <div class="agent-card">
      <div class="agent-name">${ag.nombre}</div>
      <div class="agent-meta">
        <span>📍 ${ag.localidad}, ${ag.departamento}</span>
        <span>👤 RC: ${ag.rc}</span>
        <span>🏷 Zona comercial: ${ag.zona}</span>
        <span>🚚 Zona flete: ${ag.zona_flete}</span>
        <span>🪪 RUT: ${ag.rut}</span>
      </div>
      <span class="agent-badge">Activo</span>
    </div>`;
  document.getElementById('conditions-card').innerHTML = `<div>
    ${ecoRow('Bonif. Comercial', fmt$(ec.bonif_comercial))}
    ${ecoRow('Bonif. x Venta', fmtPct(ec.bonif_vta))}
    ${ecoRow('Bonif. Extra', fmt$(ec.bonif_extra))}
    ${ecoRow('Margen x Zona', fmt$(ec.margen_zona))}
  </div>`;
}

function renderMain(data) {
  const m = document.getElementById('main-content');
  m.innerHTML = '';
  m.appendChild(buildKpisMes(data));
  if (data.mercado) m.appendChild(buildMercadoBanner(data));
  m.appendChild(buildTablaComparativa(data));
  m.appendChild(buildEconomico(data));
  m.appendChild(buildChartSection(data));
  setTimeout(() => initChart(data), 120);
}

function buildPrecioFinal(data) {
  const ec = data.economico;
  const d = document.createElement('div');
  d.className = 'precio-final-card';
  d.innerHTML = `
    <div>
      <div class="precio-final-label">Precio Final al Distribuidor</div>
      <div class="precio-final-periodo">Período: ${formatPeriodo(data.periodo)}</div>
    </div>
    <div class="precio-final-value">${fmt$(ec.precio_final)}</div>
    <div class="ganancia-badge">
      <div class="ganancia-label">Ganancia MEGAL / kg</div>
      <div class="ganancia-value">${fmt$(ec.ganancia_megal_kg)}</div>
    </div>`;
  return d;
}

function buildKpisMes(data) {
  const vol = data.volumen;
  const d = document.createElement('div');
  d.innerHTML = `
    <div class="section-title">Volumen del Mes</div>
    <div class="kpi-grid">
      ${kpiCard('Total KG',fmtKg(vol.mes.total),'kg Supergas',vol.mes_anterior?.var_total)}
      ${kpiCard('Megalight (11kg)',fmtKg(vol.mes.megalight),'kg Megalight',vol.mes_anterior?.var_megalight)}
      ${kpiCard('Año Civil — Total',fmtKg(vol.anio_civil.total),'acumulado',vol.anio_civil.var_total)}
      ${kpiCard('Año Civil — Megalight',fmtKg(vol.anio_civil.megalight),'acumulado',vol.anio_civil.var_megalight)}
      ${kpiCard('Año Móvil — Total',fmtKg(vol.anio_movil.total),'últ. 12 meses',vol.anio_movil.var_total)}
      ${kpiCard('Año Móvil — Megalight',fmtKg(vol.anio_movil.megalight),'últ. 12 meses',vol.anio_movil.var_megalight)}
    </div>`;
  return d;
}

function kpiCard(label, value, sub, varObj) {
  let v = '';
  if (varObj) {
    const cls = varObj.porcentual >= 0 ? 'up' : 'down';
    const arrow = varObj.porcentual >= 0 ? '▲' : '▼';
    v = `<div class="kpi-var ${cls}">${arrow} ${fmtPct(varObj.porcentual)} (${fmtKg(varObj.nominal)} kg)</div>`;
  }
  return `<div class="kpi-card"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div><div class="kpi-sub">${sub}</div>${v}</div>`;
}

function buildMercadoBanner(data) {
  const m = data.mercado;
  const pMegal = m.mercado_total ? m.megal/m.mercado_total : 0;
  const pAg = m.megal && data.volumen.mes.total ? data.volumen.mes.total/m.megal : 0;
  const d = document.createElement('div');
  d.innerHTML = `
    <div class="section-title">Mercado — ${formatPeriodo(data.periodo)}</div>
    <div class="mercado-banner">
      <div class="mercado-cell"><div class="mercado-cell-label">Mercado Total</div><div class="mercado-cell-value">${fmtKg(m.mercado_total)}</div><div class="mercado-cell-sub">kg</div></div>
      <div class="mercado-cell"><div class="mercado-cell-label">DUCSA</div><div class="mercado-cell-value">${fmtKg(m.ducsa)}</div><div class="mercado-cell-sub">${fmtPct(m.ducsa/m.mercado_total)} share</div></div>
      <div class="mercado-cell"><div class="mercado-cell-label">Acodike + Riogas</div><div class="mercado-cell-value">${fmtKg(m.acodike)}</div><div class="mercado-cell-sub">${fmtPct(m.acodike/m.mercado_total)} share</div></div>
      <div class="mercado-cell highlight"><div class="mercado-cell-label">MEGAL</div><div class="mercado-cell-value">${fmtKg(m.megal)}</div><div class="mercado-cell-sub">${fmtPct(pMegal)} share · agente ${fmtPct(pAg)}</div></div>
    </div>`;
  return d;
}

function buildTablaComparativa(data) {
  const vol = data.volumen;
  const rows = [
    {label:'Del mes', total:vol.mes.total, mega:vol.mes.megalight, total_ant:vol.mes_anterior.total, mega_ant:vol.mes_anterior.megalight, vt:vol.mes_anterior.var_total, vm:vol.mes_anterior.var_megalight},
    {label:'Acum. año civil', total:vol.anio_civil.total, mega:vol.anio_civil.megalight, total_ant:vol.anio_civil.total_ant, mega_ant:vol.anio_civil.megalight_ant, vt:vol.anio_civil.var_total, vm:vol.anio_civil.var_megalight},
    {label:'Acum. año móvil', total:vol.anio_movil.total, mega:vol.anio_movil.megalight, total_ant:vol.anio_movil.total_ant, mega_ant:vol.anio_movil.megalight_ant, vt:vol.anio_movil.var_total, vm:vol.anio_movil.var_megalight},
  ];
  const tbody = rows.map(r => `<tr>
    <td>${r.label}</td>
    <td>${fmtKg(r.total)}</td><td>${fmtKg(r.mega)}</td>
    <td>${fmtKg(r.total_ant)}</td><td>${fmtKg(r.mega_ant)}</td>
    <td class="${varClass(r.vt)}">${fmtVarNom(r.vt)}</td><td class="${varClass(r.vt)}">${fmtVarPct(r.vt)}</td>
    <td class="${varClass(r.vm)}">${fmtVarNom(r.vm)}</td><td class="${varClass(r.vm)}">${fmtVarPct(r.vm)}</td>
  </tr>`).join('');
  const d = document.createElement('div');
  d.innerHTML = `
    <div class="section-title">Comparativo vs. Año Anterior</div>
    <div class="table-card"><div class="table-scroll"><table>
      <thead>
        <tr><th></th><th colspan="2">Año actual</th><th colspan="2">Año anterior</th><th colspan="2">Var. Total KG</th><th colspan="2">Var. Megalight</th></tr>
        <tr><th>Período</th><th>Total KG</th><th>Megalight</th><th>Total KG</th><th>Megalight</th><th>Nominal</th><th>%</th><th>Nominal</th><th>%</th></tr>
      </thead>
      <tbody>${tbody}</tbody>
    </table></div></div>`;
  return d;
}

function buildEconomico(data) {
  const ec = data.economico;
  const d = document.createElement('div');
  d.innerHTML = `
    <div class="section-title">Detalle Económico (por kg)</div>
    <div class="eco-grid">
      <div class="eco-card">
        <div class="eco-card-title">Variables Distribuidor</div>
        ${ecoRow('Precio Público (c/IVA)', fmt$(ec.precio_publico_iva))}
        ${ecoRow('Precio Público (s/IVA)', fmt$(ec.precio_publico))}
        ${ecoRow('Margen x Zona', fmt$(ec.margen_zona))}
      </div>
      <div class="eco-card">
        <div class="eco-card-title">Variables Agente</div>
        ${ecoRow('Bonif. Comercial', fmt$(ec.bonif_comercial))}
        ${ecoRow('Bonif. x Venta', fmtPct(ec.bonif_vta))}
        ${ecoRow('Bonif. Extra', fmt$(ec.bonif_extra))}
      </div>
    </div>`;
  return d;
}

function buildChartSection(data) {
  const d = document.createElement('div');
  d.innerHTML = `
    <div class="section-title">Evolución Histórica</div>
    <div class="chart-card">
      <div class="chart-header">
        <div class="chart-title">Volumen mensual — ${data.agente.nombre}</div>
        <div class="chart-legend">
          <div class="chart-legend-item"><div class="legend-dot" style="background:#006428"></div><span>Supergas</span></div>
          <div class="chart-legend-item"><div class="legend-dot" style="background:#2E9E50"></div><span>Megalight</span></div>
        </div>
      </div>
      <div class="chart-container"><canvas id="chart-historico"></canvas></div>
    </div>`;
  return d;
}

function initChart(data) {
  const canvas = document.getElementById('chart-historico');
  if (!canvas) return;
  if (chartHistorico) { chartHistorico.destroy(); chartHistorico = null; }
  const hist = data.historico || [];
  const labels = hist.map(h => h.fecha);
  const c = CONFIG.CHART_COLORS;
  Chart.defaults.color = c.textMuted;
  Chart.defaults.font.family = "'DM Mono', monospace";
  Chart.defaults.font.size = 11;
  chartHistorico = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'Supergas (kg)', data:hist.map(h=>h.total), borderColor:c.primary, backgroundColor:'rgba(0,100,40,0.06)', borderWidth:2, pointRadius:0, pointHoverRadius:4, tension:0.3, fill:true },
        { label:'Megalight (kg)', data:hist.map(h=>h.megalight), borderColor:c.accent, backgroundColor:'rgba(46,158,80,0.04)', borderWidth:1.5, pointRadius:0, pointHoverRadius:4, tension:0.3, fill:true, borderDash:[4,3] }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: {
        legend:{ display:false },
        tooltip:{ backgroundColor:'rgba(15,31,15,0.92)', borderColor:'rgba(0,100,40,0.2)', borderWidth:1, titleColor:'#fff', bodyColor:c.textMuted, padding:10,
          callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${fmtKg(ctx.raw)} kg` }
        }
      },
      scales: {
        x:{ grid:{ color:c.gridLine }, ticks:{ maxTicksLimit:12, maxRotation:0,
          callback:(_,i)=>{ const l=labels[i]; if(!l) return ''; const[y,m]=l.split('-'); return m==='01'?y:['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][parseInt(m)]; }
        }},
        y:{ grid:{ color:c.gridLine }, ticks:{ callback:v=>fmtKg(v) } }
      }
    }
  });
}

function ecoRow(label, val) {
  return `<div class="eco-row"><span class="eco-key">${label}</span><span class="eco-val">${val}</span></div>`;
}
function fmt$(v) {
  if (v===null||v===undefined) return '—';
  const n=Number(v); if(isNaN(n)) return '—';
  return `$ ${n.toLocaleString('es-UY',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
}
function fmtKg(v) {
  if (v===null||v===undefined) return '—';
  const n=Number(v); if(isNaN(n)) return '—';
  if(Math.abs(n)>=1000000) return (n/1000000).toFixed(2)+'M';
  if(Math.abs(n)>=1000) return (n/1000).toFixed(1)+'k';
  return n.toLocaleString('es-UY');
}
function fmtPct(v) {
  if (v===null||v===undefined) return '—';
  const n=Number(v); if(isNaN(n)) return '—';
  return (n*100).toFixed(1)+'%';
}
function fmtVarNom(v) { if(!v) return 'S/D'; return (v.nominal>=0?'+':'')+fmtKg(v.nominal); }
function fmtVarPct(v) { if(!v) return 'S/D'; return (v.porcentual>=0?'+':'')+(v.porcentual*100).toFixed(1)+'%'; }
function varClass(v) { if(!v) return 'var-neutral'; return v.porcentual>=0?'var-up':'var-down'; }
function formatPeriodo(p) {
  if(!p) return '';
  const[y,m]=p.split('-').map(Number);
  const s=new Date(y,m-1,1).toLocaleDateString('es-UY',{month:'long',year:'numeric'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  if (user === 'megalcampeon' && pass === 'megalelmejor') {
    document.getElementById('login-overlay').style.display = 'none';
    sessionStorage.setItem('glp_auth', '1');
  } else {
    document.getElementById('login-error').classList.add('show');
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const overlay = document.getElementById('login-overlay');
    if (overlay && overlay.style.display !== 'none') doLogin();
  }
});

// Check auth on load
document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('glp_auth') !== '1') {
    document.getElementById('login-overlay').style.display = 'flex';
  } else {
    document.getElementById('login-overlay').style.display = 'none';
  }
});


function renderSidebarTodos(data) {
  document.getElementById('agent-info-card').innerHTML = `
    <div class="agent-card">
      <div class="agent-name">Todos los agentes</div>
      <div class="agent-meta">
        <span>👥 ${data.total_agentes} agentes activos</span>
        <span>📅 Período: ${formatPeriodo(data.periodo)}</span>
      </div>
      <span class="agent-badge">Consolidado</span>
    </div>`;
  document.getElementById('conditions-card').innerHTML = `
    <div style="padding:0 8px">
      ${ecoRow('Total mercado MEGAL', fmtKg(data.mercado?.megal) + ' kg')}
      ${ecoRow('Participación', fmtPct(data.mercado?.megal / data.mercado?.mercado_total))}
    </div>`;
}

function renderMainTodos(data) {
  const m = document.getElementById('main-content');
  m.innerHTML = '';

  // KPIs consolidados
  const vol = data.volumen_consolidado;
  const sec = document.createElement('div');
  sec.innerHTML = `
    <div class="section-title">Consolidado — Todos los agentes</div>
    <div class="kpi-grid">
      ${kpiCard('Total KG del mes', fmtKg(vol?.mes_total), 'kg Supergas', vol?.var_mes_total)}
      ${kpiCard('Megalight del mes', fmtKg(vol?.mes_mega), 'kg Megalight', vol?.var_mes_mega)}
      ${kpiCard('Año Civil — Total', fmtKg(vol?.civil_total), 'acumulado', vol?.var_civil_total)}
      ${kpiCard('Año Civil — Megalight', fmtKg(vol?.civil_mega), 'acumulado', vol?.var_civil_mega)}
      ${kpiCard('Año Móvil — Total', fmtKg(vol?.movil_total), 'últ. 12 meses', vol?.var_movil_total)}
      ${kpiCard('Año Móvil — Megalight', fmtKg(vol?.movil_mega), 'últ. 12 meses', vol?.var_movil_mega)}
    </div>`;
  m.appendChild(sec);

  if (data.mercado) m.appendChild(buildMercadoBanner(data));

  // Tabla ranking agentes
  if (data.ranking) {
    const div = document.createElement('div');
    const rows = data.ranking.map((r,i) => `<tr>
      <td>${i+1}</td>
      <td>${r.nombre}</td>
      <td>${r.rc || '—'}</td>
      <td>${fmtKg(r.mes_total)}</td>
      <td>${fmtKg(r.mes_mega)}</td>
      <td>${fmtKg(r.civil_total)}</td>
      <td class="${r.var_mes >= 0 ? 'var-up':'var-down'}">${r.var_mes !== null ? (r.var_mes>=0?'+':'')+(r.var_mes*100).toFixed(1)+'%' : 'S/D'}</td>
    </tr>`).join('');
    div.innerHTML = `
      <div class="section-title">Ranking de agentes — ${formatPeriodo(data.periodo)}</div>
      <div class="table-card"><div class="table-scroll"><table>
        <thead><tr>
          <th>#</th><th style="text-align:left">Agente</th><th style="text-align:left">RC</th>
          <th>KG Mes</th><th>Megalight Mes</th><th>Año Civil</th><th>Var. vs año ant.</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
    m.appendChild(div);
  }
}

</script>
</body>
</html>
